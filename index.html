<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カメラテスト</title>
</head>
<body style="text-align: center; padding-top: 50px;">

    <h2>カメラ起動テスト（Ver 3.0）</h2>
    
    <!-- 映像を表示するだけのシンプルな箱 -->
    <video id="testVideo" autoplay playsinline style="width: 100%; max-width: 400px; background: black;"></video>
    <br><br>
    
    <button id="testBtn" style="padding: 20px 40px; font-size: 20px;">📷 カメラを起動する</button>
    
    <h3 id="testMsg" style="margin-top: 30px; color: blue;">ボタンを押してください</h3>

<script>
    document.getElementById('testBtn').addEventListener('click', async () => {
        const msg = document.getElementById('testMsg');
        msg.innerText = "処理を開始しました...";
        msg.style.color = "orange";

        try {
            // 最も単純な命令でカメラを要求
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            
            msg.innerText = "✅ カメラ接続成功！映像を表示します。";
            msg.style.color = "green";
            
            document.getElementById('testVideo').srcObject = stream;
        } catch (err) {
            // エラーをそのまま文字として画面に出す
            msg.innerText = "❌ エラー: " + err.name + " (" + err.message + ")";
            msg.style.color = "red";
        }
    });
</script>

</body>
</html>
