<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Test03-04 工程実績Web版</title>

<!-- ZXing -->
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    padding:10px;
}

h2{
    text-align:center;
}

.card{
    background:#fff;
    padding:12px;
    margin-bottom:10px;
    border-radius:8px;
}

button{
    width:100%;
    height:60px;
    font-size:20px;
    margin-top:10px;
}

label{
    font-weight:bold;
}

.value{
    font-size:22px;
    font-weight:bold;
    margin-top:5px;
}

video{
    width:100%;
    border:2px solid #333;
    border-radius:8px;
    margin-top:10px;
}

</style>

</head>

<body>

<h2>Test03 工程実績（Web版）</h2>

<div class="card">
    <label>製番</label>
    <div id="orderNo" class="value">未読取</div>
</div>

<div class="card">
    <label>工順</label>
    <div id="processNo" class="value">未読取</div>
</div>

<button onclick="startScan()">📷 カメラ起動</button>

<video id="video" autoplay playsinline></video>

<script>

/****************************************************
 * グローバル
 ****************************************************/
let codeReader;
let mode = "ORDER";
let deviceId;

/****************************************************
 * 初期化
 ****************************************************/
window.onload = function(){

    codeReader = new ZXing.BrowserMultiFormatReader();

};

/****************************************************
 * カメラ起動
 ****************************************************/
function startScan(){

    codeReader.listVideoInputDevices()
    .then(devices => {

        if(devices.length === 0){
            alert("カメラが見つかりません");
            return;
        }

        // 1. デフォルトは最初のデバイスを設定
        let targetDeviceId = devices[0].deviceId;

        // 2. 外側カメラ（back, rear, environmentなど）のキーワードを持つデバイスを探す
        const backCamera = devices.find(device => {
            const label = device.label.toLowerCase();
            return label.includes('back') || label.includes('rear') || label.includes('environment') || label.includes('外');
        });

        // 3. 見つかった場合はそのデバイスIDを優先する
        if (backCamera) {
            targetDeviceId = backCamera.deviceId;
        } else if (devices.length > 1) {
            // キーワードで見つからず、複数が存在する場合は最後のデバイス（スマホでは外側のことが多い）を試す
            targetDeviceId = devices[devices.length - 1].deviceId;
        }

        mode = "ORDER";

        // 選択した targetDeviceId でカメラを起動
        codeReader.decodeFromVideoDevice(
            targetDeviceId,
            "video",
            onResult
        );

    })
    .catch(err => {
        alert("カメラエラー: " + err);
    });

}

/****************************************************
 * 読取処理
 ****************************************************/
function onResult(result, err){

    if(result){

        const text = result.text;

        // --------------------------
        // 製番
        // --------------------------
        if(mode === "ORDER"){

            document.getElementById("orderNo").innerText = text;

            mode = "PROCESS";

            return;
        }

        // --------------------------
        // 工順（3〜4桁）
        // --------------------------
        if(mode === "PROCESS"){

            if(!/^\d{3,4}$/.test(text)){
                return;
            }

            document.getElementById("processNo").innerText = text;

            stopScan();

            alert("読取完了");

        }

    }

}

/****************************************************
 * 停止
 ****************************************************/
function stopScan(){

    codeReader.reset();

}

</script>

</body>
</html>
